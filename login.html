// Function to get current patient from database
function getCurrentPatient() {
    // First try to get from localStorage
    const savedPatient = localStorage.getItem('llamacare_current_patient');
    
    if (savedPatient) {
        return savedPatient;
    }
    
    // If no saved patient, use the random selection from the array
    const patientNames = ["Rearabetswe Sons", "Neo Letswalo", "Enoch Emmanuel", "Kamogelo Mvemve", "Tinyiko Selamolela"];
    const randomIndex = Math.floor(Math.random() * patientNames.length);
    const randomPatient = patientNames[randomIndex];
    
    // Save this random patient for consistency across the session
    localStorage.setItem('llamacare_current_patient', randomPatient);
    
    return randomPatient;
}

// Function to get patient data from database
function getPatientData(patientName) {
    const patientList = JSON.parse(localStorage.getItem('llamacare_patient_list') || '[]');
    
    // Find patient by name
    const patientData = patientList.find(patient => 
        patient.name.toLowerCase() === patientName.toLowerCase()
    );
    
    if (patientData) {
        return patientData;
    }
    
    // If not found in registration data, return default data
    return {
        name: patientName,
        id: 'LLC-' + Math.floor(1000 + Math.random() * 9000),
        registrationDate: new Date().toISOString().split('T')[0]
    };
}

// Function to get initials from a full name
function getInitials(fullName) {
    if (!fullName) return 'LL';
    
    return fullName
        .split(' ')
        .map(word => word[0])
        .join('')
        .toUpperCase();
}

// Function to update patient info on page
function updatePatientInfoOnPage() {
    const patientName = getCurrentPatient();
    const patientInitials = getInitials(patientName);
    const patientData = getPatientData(patientName);
    
    // Update patient name on page (if element exists)
    const patientNameElement = document.getElementById('patientName');
    if (patientNameElement) {
        patientNameElement.textContent = patientName;
    }
    
    // Update patient avatar with initials (if element exists)
    const patientAvatarElement = document.getElementById('patientAvatar');
    if (patientAvatarElement) {
        patientAvatarElement.textContent = patientInitials;
    }
    
    // Update patient ID (if element exists)
    const patientIdElement = document.getElementById('patientId');
    if (patientIdElement && patientData.id) {
        patientIdElement.textContent = patientData.id;
    }
    
    // Update database patient name (if element exists)
    const dbPatientNameElement = document.getElementById('dbPatientName');
    if (dbPatientNameElement) {
        dbPatientNameElement.textContent = patientName;
    }
    
    // Update notification patient name (if element exists)
    const notificationPatientElement = document.getElementById('notificationPatientName');
    if (notificationPatientElement) {
        notificationPatientElement.textContent = patientName;
    }
    
    console.log(`Current patient: ${patientName} (${patientInitials})`, patientData);
    return patientName;
}

// Call this function when the page loads
document.addEventListener('DOMContentLoaded', function() {
    // Update patient info
    updatePatientInfoOnPage();

    // Form submission
    document.getElementById('registerForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        // Simple validation
