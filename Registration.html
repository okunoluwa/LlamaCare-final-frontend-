<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>LlamaCare Registration</title>

        <style>
/* RESET + GLOBAL FONT */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

/* BODY BACKGROUND */
body {
    background-color: #f0f9ff;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    background-image: 
        radial-gradient(circle at 10% 20%, rgba(176, 224, 230, 0.3) 0%, transparent 20%),
        radial-gradient(circle at 90% 80%, rgba(135, 206, 235, 0.3) 0%, transparent 20%);
}

/* THEME & VOICE BUTTONS */
.theme-btn,
.voice-btn {
    position: fixed;
    top: 20px;
    background: linear-gradient(to right, #3498db, #2ecc71);
    border: none;
    color: white;
    font-size: 20px;
    padding: 12px 15px;
    border-radius: 50%;
    cursor: pointer;
    box-shadow: 0 6px 15px rgba(52, 152, 219, 0.4);
}

.theme-btn { right: 20px; }
.voice-btn { right: 80px; }

/* FORM CARD */
.container {
    background: white;
    padding: 40px;
    width: 100%;
    max-width: 450px;
    border-radius: 25px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    text-align: center;
    animation: fadeIn 1s ease;
}

/* TITLE */
.container h2 {
    font-size: 2rem;
    margin-bottom: 25px;
    color: #2c3e50;
    position: relative;
}

.container h2::after {
    content: '';
    width: 120px;
    height: 4px;
    background: linear-gradient(to right, #3498db, #2ecc71);
    display: block;
    margin: 10px auto 0;
    border-radius: 10px;
}

/* INPUT FIELDS */
form input,
form select {
    width: 100%;
    padding: 14px;
    margin-bottom: 15px;
    border-radius: 12px;
    border: 1px solid #dcdde1;
    font-size: 15px;
    background: #f8fbff;
    outline: none;
    transition: border 0.3s ease;
}

form input:focus,
form select:focus {
    border: 2px solid #3498db;
}

/* UPLOAD LABEL */
.upload-label {
    display: block;
    text-align: left;
    font-size: 14px;
    margin-bottom: 8px;
    color: #555;
}

/* SUBMIT BUTTON */
form button {
    width: 100%;
    padding: 15px;
    border-radius: 50px;
    border: none;
    background: linear-gradient(to right, #3498db, #2ecc71);
    color: white;
    font-size: 18px;
    font-weight: 600;
    cursor: pointer;
    box-shadow: 0 8px 20px rgba(52, 152, 219, 0.4);
    transition: all 0.3s ease;
}

form button:hover {
    transform: translateY(-3px);
    box-shadow: 0 12px 28px rgba(52, 152, 219, 0.5);
}

/* LOGIN TEXT */
.container p {
    margin-top: 20px;
    font-size: 14px;
    color: #7f8c8d;
}

.container a {
    color: #3498db;
    text-decoration: none;
    font-weight: 600;
}

.container a:hover {
    text-decoration: underline;
}

/* ANIMATION */
@keyframes fadeIn {
    from { opacity: 0; transform: translateY(15px); }
    to { opacity: 1; transform: translateY(0); }
}

/* MOBILE RESPONSIVE */
@media (max-width: 500px) {
    .container {
        padding: 30px 20px;
    }
}
</style>
    </head>

    <body>

        <button id="themeToggle" class="theme-btn">🌙</button>
        <button id="voiceAssist" class="voice-btn">🗣️</button>

        <div class="container">
            <h2>Create Patient Account</h2>

            <form id="registerForm">

                <input type="text" id="name" placeholder="Full Name" required>

                <input type="email" id="email" placeholder="Email Address"
                    required>

                <input type="password" id="password" placeholder="Password"
                    required>

                <input type="text" id="location"
                    placeholder="Location (City, Country)" required>

                <select id="gender" required>
                    <option value>Select Gender</option>
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                    <option value="Other">Other</option>
                </select>

                <label class="upload-label">Upload Profile Picture</label>
                <input type="file" id="profile" accept="image/*" required>

                <button type="submit"
                    onclick="window.location.href='login.html'">Register</button>
            </form>

            <p>Already have an account? <a href="login.html">Login</a></p>
        </div>

        <script src="register.js"></script>

    </body>
</html>
